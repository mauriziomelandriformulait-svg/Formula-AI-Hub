<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula AI-Tech</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; display: flex; min-height: 100vh; }
        .wrapper { display: flex; width: 100%; }
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .sidebar { width: 80px; background: #ffffff; border-left: 1px solid #cbd5e1; display: flex; flex-direction: column; align-items: center; padding-top: 20px; box-shadow: -2px 0 5px rgba(0,0,0,0.05); }
        
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 3rem; color: #111; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 900px; width: 100%; }
        
        .map-card { background: white; border: 1px solid #cbd5e1; border-radius: 12px; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; border-top: 6px solid #00aabb; cursor: pointer; text-decoration: none; color: #1e293b; }
        .map-card:hover { transform: translateY(-5px); border-color: #008899; }
        
        .icon-box { width: 64px; height: 64px; background: #e6f7f9; color: #00aabb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
        .label { font-size: 14px; font-weight: 600; text-align: center; }

        .sidebar-icon { cursor: pointer; color: #1e293b; transition: color 0.2s; }
        .sidebar-icon:hover { color: #00aabb; }
        .size-6 { width: 32px; height: 32px; }

        /* Chat Styles */
        #chatOverlay { display: none; position: fixed; top: 20px; right: 100px; width: 380px; height: 400px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); flex-direction: column; overflow: hidden; border: 1px solid #e0e0e0; z-index: 1000; }
        .chat-header { background: #000; padding: 12px; color: #00aabb; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; }
        .message.user { align-self: flex-end; background: #00aabb; color: white; }
        .message.bot { align-self: flex-start; background: #f0f0f0; }
        .chat-input { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 5px; }
        #userInput { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .btn-action { cursor: pointer; padding: 5px 10px; border: none; border-radius: 20px; background: #eee; transition: 0.2s; }
    </style>
</head>
<body>

<div class="wrapper">
    <main class="main-content">
        <h1>Formula AI-Tech</h1>
        <div class="grid">
            <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/AI%20-%20Predictive%20Engine')">
                <div class="icon-box">AI</div>
                <span class="label">AI-Predictive Engine</span>
            </div>
            <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/AI%20-%20Sales%20Accelerator')">
                <div class="icon-box">SA</div>
                <span class="label">AI-Sales Accelerator</span>
            </div>
            <div class="map-card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/AI%20-%20Ricerca%20Fornitori')">
                <div class="icon-box">FR</div>
                <span class="label">AI-Finder</span>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <div class="sidebar-icon" onclick="document.getElementById('chatOverlay').style.display = 'flex'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 0 1-.923 1.785A5.969 5.969 0 0 0 6 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337Z" /></svg>
        </div>
    </aside>
</div>

<div id="chatOverlay">
    <div class="chat-header">
        <span>🤖 Formula AI Agent</span>
        <span onclick="document.getElementById('chatOverlay').style.display='none'" style="cursor:pointer">❌</span>
    </div>
    <div class="chat-messages" id="chatMessages"><div class="message bot">Ciao! Come posso aiutarti oggi con Formula AI-Tech?</div></div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Scrivi qui...">
        <button class="btn-action" onclick="toggleGeneration()">Invia</button>
    </div>
</div>

<script>
    function inviaMessaggioNavigazione(percorsoTarget) {
        let routePath = percorsoTarget.includes('#') ? percorsoTarget.split('#')[1] : percorsoTarget;
        const payload = { type: 'ROUTER_NAVIGATION', action: 'navigate', url: percorsoTarget, route: routePath };
        window.parent.postMessage(payload, '*');
    }
    
    function toggleGeneration() {
        const input = document.getElementById('userInput');
        if(input.value) {
            document.getElementById('chatMessages').innerHTML += `<div class="message user">${input.value}</div>`;
            input.value = '';
        }
    }
</script>
</body>
</html>
