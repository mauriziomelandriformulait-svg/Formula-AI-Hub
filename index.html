<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formula AI-Tech</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
    
    :root {
      --bg: #f5f5f5; --surface: #ffffff; --border: #d8d8d8; --text: #1a1a1a;
      --accent: #00aabb; --accent-hover: #008899; --shadow: 0 4px 12px rgba(0,0,0,0.05);
    }
    
    body { 
      margin: 0; font-family: 'Figtree', sans-serif; background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
    }

    h1 { font-size: 24px; font-weight: 700; margin-bottom: 3rem; color: #111; letter-spacing: -0.5px; }

    .grid-container {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;
      max-width: 900px; width: 90%;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border); padding: 2rem;
      border-radius: 8px; text-align: center; transition: transform 0.2s, box-shadow 0.2s;
      color: var(--text); box-shadow: var(--shadow); cursor: pointer; display: block;
    }

    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-color: var(--accent); }

    .icon-box {
      width: 64px; height: 64px; background: #e6f7f9; color: var(--accent);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; font-size: 24px; font-weight: 700;
    }

    .card h2 { font-size: 16px; margin: 0; font-weight: 600; }
  </style>
</head>
<body>

  <h1>Formula AI-Tech</h1>

  <div class="grid-container">
    <div class="card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/AI%20-%20Predictive%20Engine')">
      <div class="icon-box">AI</div>
      <h2>AI-Predictive Engine</h2>
    </div>

    <div class="card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/AI%20-%20Sales%20Accelerator')">
      <div class="icon-box">SA</div>
      <h2>AI-Sales Accelerator</h2>
    </div>

    <div class="card" onclick="inviaMessaggioNavigazione('https://diapdemo.formula.it:8282/due/#/home/desktop/AI%20-%20Ricerca%20Fornitori')">
      <div class="icon-box">FR</div>
      <h2>AI-Finder</h2>
    </div>
  </div>

  <script>
      function inviaMessaggioNavigazione(percorsoTarget) {
          let routePath = percorsoTarget.includes('#') ? percorsoTarget.split('#')[1] : percorsoTarget;
          const payload = { type: 'ROUTER_NAVIGATION', action: 'navigate', url: percorsoTarget, route: routePath };
          window.parent.postMessage(payload, '*');
      }
  </script>
</body>
</html>
